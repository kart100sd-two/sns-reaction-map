<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>テーマプレビュー — SNS反応まっぷ</title>
<style>
:root {
  color-scheme: light;
  --ds-bg:           #f4f6f8;
  --ds-panel:        #ffffff;
  --ds-ink:          #172033;
  --ds-muted:        #667085;
  --ds-line:         #d7dce5;
  --ds-accent:       #1769d1;
  --ds-accent-soft:  #e7f1ff;
  --ds-warn:         #b54708;
  --ds-ok:           #16885a;
  --ds-purple:       #7a4cc2;
  --ds-shadow:       0 10px 28px rgba(16, 24, 40, .06);
  --ds-font:         -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
  --ds-radius:       8px;
}
[data-theme="dark"] {
  color-scheme: dark;
  --ds-bg:#0f1117; --ds-panel:#1a1d27; --ds-ink:#e4e7ec; --ds-muted:#8b95a8;
  --ds-line:#2e3346; --ds-accent:#5b9cf6; --ds-accent-soft:rgba(91,156,246,.12);
  --ds-warn:#f5a623; --ds-ok:#34d399; --ds-purple:#a78bfa;
  --ds-shadow:0 10px 28px rgba(0,0,0,.35);
}
[data-theme="soft"] {
  --ds-bg:#faf7f5; --ds-panel:#ffffff; --ds-ink:#2d2a26; --ds-muted:#9a9086;
  --ds-line:#e8e0d8; --ds-accent:#5a8fd4; --ds-accent-soft:#eef4fb;
  --ds-warn:#d4874e; --ds-ok:#5bae8a; --ds-purple:#9a7fd4;
  --ds-shadow:0 8px 24px rgba(120,100,80,.06); --ds-radius:14px;
}
[data-theme="bold"] {
  --ds-bg:#f0f0f0; --ds-panel:#ffffff; --ds-ink:#0a0a0a; --ds-muted:#505050;
  --ds-line:#c0c0c0; --ds-accent:#0047e0; --ds-accent-soft:#dbe8ff;
  --ds-warn:#d63200; --ds-ok:#00804a; --ds-purple:#6b21c8;
  --ds-shadow:0 12px 32px rgba(0,0,0,.12); --ds-radius:4px;
}
</style>
<style>
  body { margin: 0; font-family: var(--ds-font); background: var(--ds-bg); color: var(--ds-ink); transition: background .3s, color .3s; }
  .theme-switcher { position: sticky; top: 0; z-index: 100; display: flex; gap: 8px; padding: 12px min(5vw,56px); background: var(--ds-panel); border-bottom: 1px solid var(--ds-line); }
  .theme-switcher button { font-family: var(--ds-font); font-size: 14px; font-weight: 600; padding: 8px 18px; border: 2px solid var(--ds-line); border-radius: var(--ds-radius); background: var(--ds-bg); color: var(--ds-ink); cursor: pointer; transition: all .15s; }
  .theme-switcher button.active { background: var(--ds-accent); color: #fff; border-color: var(--ds-accent); }
  .preview-area { padding: 24px min(5vw,56px) 48px; max-width: 1100px; }
  .section { margin-bottom: 32px; }
  .section h2 { font-size: 18px; margin: 0 0 12px; }

  /* token swatches */
  .swatch-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px,1fr)); gap: 10px; }
  .swatch { border-radius: var(--ds-radius); overflow: hidden; box-shadow: var(--ds-shadow); }
  .swatch-color { height: 56px; }
  .swatch-label { padding: 8px 10px; background: var(--ds-panel); font-size: 12px; color: var(--ds-muted); }

  /* component demos */
  .demo-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px,1fr)); gap: 16px; }
  .demo-card { background: var(--ds-panel); border-radius: var(--ds-radius); box-shadow: var(--ds-shadow); padding: 20px; }
  .demo-card .label { font-size: 13px; color: var(--ds-muted); margin-bottom: 4px; }
  .demo-card .value { font-size: 28px; font-weight: 700; }

  .stance-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .stance-badge { display: inline-block; padding: 4px 14px; border-radius: 999px; font-size: 13px; font-weight: 600; }

  .demo-bar { height: 10px; border-radius: 5px; margin-bottom: 8px; }

  .demo-alert { padding: 14px 18px; border-radius: var(--ds-radius); border-left: 4px solid var(--ds-warn); background: var(--ds-panel); box-shadow: var(--ds-shadow); font-size: 14px; color: var(--ds-ink); }
</style>
<!-- ADSENSE_TAG_START -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2542211932832864" crossorigin="anonymous"></script>
<!-- ADSENSE_TAG_END -->
<!-- GA_TAG_START -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-K10S4YCZFH"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-K10S4YCZFH');
  </script>
<!-- GA_TAG_END -->
</head>
<body>

<div class="theme-switcher">
  <button class="active" onclick="setTheme('')">Default</button>
  <button onclick="setTheme('dark')">Dark</button>
  <button onclick="setTheme('soft')">Soft</button>
  <button onclick="setTheme('bold')">Bold</button>
</div>

<div class="preview-area">

  <div class="section">
    <h2>Color Tokens</h2>
    <div class="swatch-grid">
      <div class="swatch"><div class="swatch-color" style="background:var(--ds-bg)"></div><div class="swatch-label">--ds-bg</div></div>
      <div class="swatch"><div class="swatch-color" style="background:var(--ds-panel)"></div><div class="swatch-label">--ds-panel</div></div>
      <div class="swatch"><div class="swatch-color" style="background:var(--ds-ink)"></div><div class="swatch-label">--ds-ink</div></div>
      <div class="swatch"><div class="swatch-color" style="background:var(--ds-muted)"></div><div class="swatch-label">--ds-muted</div></div>
      <div class="swatch"><div class="swatch-color" style="background:var(--ds-line)"></div><div class="swatch-label">--ds-line</div></div>
      <div class="swatch"><div class="swatch-color" style="background:var(--ds-accent)"></div><div class="swatch-label">--ds-accent</div></div>
      <div class="swatch"><div class="swatch-color" style="background:var(--ds-accent-soft)"></div><div class="swatch-label">--ds-accent-soft</div></div>
      <div class="swatch"><div class="swatch-color" style="background:var(--ds-warn)"></div><div class="swatch-label">--ds-warn</div></div>
      <div class="swatch"><div class="swatch-color" style="background:var(--ds-ok)"></div><div class="swatch-label">--ds-ok</div></div>
      <div class="swatch"><div class="swatch-color" style="background:var(--ds-purple)"></div><div class="swatch-label">--ds-purple</div></div>
    </div>
  </div>

  <div class="section">
    <h2>StatCard</h2>
    <div class="demo-cards">
      <div class="demo-card"><div class="label">収集件数</div><div class="value" style="color:var(--ds-ink)">192<span style="font-size:14px;font-weight:400;color:var(--ds-muted)"> 件</span></div></div>
      <div class="demo-card"><div class="label">賛成・支持</div><div class="value" style="color:var(--ds-accent)">52<span style="font-size:14px;font-weight:400;color:var(--ds-muted)"> 件</span></div></div>
      <div class="demo-card"><div class="label">反対・慎重</div><div class="value" style="color:var(--ds-warn)">61<span style="font-size:14px;font-weight:400;color:var(--ds-muted)"> 件</span></div></div>
      <div class="demo-card"><div class="label">中立・不明</div><div class="value" style="color:var(--ds-muted)">79<span style="font-size:14px;font-weight:400;color:var(--ds-muted)"> 件</span></div></div>
    </div>
  </div>

  <div class="section">
    <h2>StanceBadge</h2>
    <div class="stance-row">
      <span class="stance-badge" style="background:var(--ds-accent-soft);color:var(--ds-accent)">賛成</span>
      <span class="stance-badge" style="background:rgba(181,71,8,.1);color:var(--ds-warn)">反対</span>
      <span class="stance-badge" style="background:rgba(122,76,194,.1);color:var(--ds-purple)">手続き重視</span>
      <span class="stance-badge" style="background:rgba(102,112,133,.1);color:var(--ds-muted)">中立</span>
      <span class="stance-badge" style="background:rgba(22,136,90,.1);color:var(--ds-ok)">肯定的</span>
    </div>
  </div>

  <div class="section">
    <h2>BarList</h2>
    <div style="max-width:500px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;font-size:14px"><span style="width:80px;color:var(--ds-muted)">賛成</span><div class="demo-bar" style="flex:1;max-width:270px;background:var(--ds-accent)"></div><span>52</span></div>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;font-size:14px"><span style="width:80px;color:var(--ds-muted)">反対</span><div class="demo-bar" style="flex:1;max-width:320px;background:var(--ds-warn)"></div><span>61</span></div>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;font-size:14px"><span style="width:80px;color:var(--ds-muted)">中立</span><div class="demo-bar" style="flex:1;max-width:400px;background:var(--ds-muted)"></div><span>79</span></div>
    </div>
  </div>

  <div class="section">
    <h2>NoticeAlert</h2>
    <div class="demo-alert">このデータはSNS上の反応をサンプリングしたものです。世論比率としては扱えません。</div>
  </div>

</div>

<script>
function setTheme(name) {
  document.documentElement.setAttribute('data-theme', name);
  document.querySelectorAll('.theme-switcher button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
}
</script>
</body>
</html>
