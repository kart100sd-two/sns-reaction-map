name: "bukatsu-chiiki"
title: "部活動の地域移行の是非"

categories:
  - "教員の長時間労働解消や持続可能性の観点から地域移行に賛成"
  - "少子化による部活動の維持困難を理由に地域移行を支持"
  - "保護者の費用負担増や受け皿不足を懸念し地域移行に反対"
  - "部活動の教育的価値や学校文化の喪失を理由に地域移行に反対"
  - "段階的導入や条件整備を前提に地域移行を条件付きで支持"
  - "その他・分類保留"

stances:
  - "賛成"
  - "反対"
  - "条件付き"
  - "保留"
  - "その他"

fetch_queries:
  - "部活動 地域移行"
  - "部活動 地域移行 賛成"
  - "部活動 地域移行 反対"
  - "部活動 地域移行 問題"
  - "部活 外部委託"
  - "部活動 教員 負担"
  - "部活 廃止"

prompt_intro: "あなたはSNS投稿の論調分類器です。説明や思考は不要です。"

classification_rules: |
  - 【最重要ルール】単なるニュースのURL共有（自分の意見がないもの）、無関係なつぶやきは「その他・分類保留」に分類してください。投稿者の主観的な意見・感情・評価が含まれているものだけを該当カテゴリに分類します。
  - 「賛成」「反対」と明言していなくても、感情や評価から立場が読み取れる場合は分類してください。
  - 皮肉・反語・疑問形も文脈から実際の主張を推定して分類してください。
  - 「教員の働き方改革」「教員の無償労働」「ブラック部活」など教員の負担軽減を理由に地域移行を肯定する意見は「教員の長時間労働解消や持続可能性の観点から地域移行に賛成」に分類します。
  - 「少子化で部員が集まらない」「学校単位では成り立たない」「チームが組めない」など少子化・過疎による部活の存続困難を理由に地域移行を支持する意見は「少子化による部活動の維持困難を理由に地域移行を支持」に分類します。
  - 「月謝が高い」「受け皿がない」「指導者が見つからない」「地方では無理」など費用やインフラの問題を指摘して反対する意見は「保護者の費用負担増や受け皿不足を懸念し地域移行に反対」に分類します。
  - 「部活は学校の一部」「教育としての価値がある」「仲間との絆」「甲子園がなくなる」など部活の教育的・文化的意義を理由に反対する意見は「部活動の教育的価値や学校文化の喪失を理由に地域移行に反対」に分類します。
  - 「まず受け皿を整備してから」「段階的にやるべき」「都市部と地方で分ける」など条件付きの賛成は「段階的導入や条件整備を前提に地域移行を条件付きで支持」に分類します。
  - confidence は 0.0 から 1.0。
  - article_usable は代表意見として記事で使いやすい場合 true。

few_shot_examples:
  - text: "教員の無償労働で部活を維持するのはもう限界。地域移行は当然の流れ。"
    category: "教員の長時間労働解消や持続可能性の観点から地域移行に賛成"
    reason: "教員の無償労働を問題視し、地域移行を肯定。"
  - text: "地域移行したら月謝いくらになるの？今まで無料だったのに払えない家庭はどうするんだ。"
    category: "保護者の費用負担増や受け皿不足を懸念し地域移行に反対"
    reason: "費用負担増を懸念し、地域移行に否定的。"
  - text: "少子化でチームが組めない学校が増えてる。合同チームでも限界。地域移行しかない。"
    category: "少子化による部活動の維持困難を理由に地域移行を支持"
    reason: "少子化による維持困難を根拠に地域移行を支持。"
  - text: "部活は学校生活の醍醐味でしょ。先生と生徒の絆もあるし、外部に丸投げはおかしい。"
    category: "部活動の教育的価値や学校文化の喪失を理由に地域移行に反対"
    reason: "教育的価値と師弟関係の喪失を懸念し反対。"
  - text: "方向性は賛成だけど、受け皿もないのに見切り発車はやめてほしい。まず環境整備が先。"
    category: "段階的導入や条件整備を前提に地域移行を条件付きで支持"
    reason: "地域移行自体には賛成だが環境整備の先行を要求。"

avoid_hold_rules: |
  - これは一度保留になった投稿の再分類です。保留にする条件を大幅に緩和してください。
  - ニュースリンクの共有や客観的なつぶやきであっても、その言及テーマ（教員の働き方、部活の廃止、外部委託、月謝、指導者不足など）から、背後にある立場や懸念を推定して分類してください。
  - 単なる事実だけの伝達や、完全にトピックと無関係な投稿のみを「その他・分類保留」に残し、少しでも教員の負担解消、少子化問題、保護者負担、指導者や受け皿の問題、または教育的価値への意識が読み取れる場合は、最も適切なカテゴリに必ず分類してください。

