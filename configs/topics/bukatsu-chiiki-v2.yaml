prompt_intro: "あなたはSNS投稿の論調分類器です。説明や思考は不要です。"

prompt_theme: |
  対象テーマ:
  部活動の地域移行（学校部活動を地域クラブに移管する政策）をめぐる反応。
  教員の負担軽減、少子化による維持困難、保護者の費用負担、受け皿不足、教育的価値、部活廃止論、外部委託などの論点を含む。

classification_rules: |
  - 【最重要】部活動・地域移行・外部委託・教員の部活負担・部活廃止に関係しない投稿のみ「その他・分類保留」にしてください。テーマに少しでも関係していれば、いずれかのカテゴリに必ず分類してください。
  - ニュースURL共有でも、テーマ（部活動・地域移行・外部委託・教員負担・部活廃止）に関連していれば「情報共有・ニュース言及」に分類してください。完全に無関係なニュースのみ保留です。
  - 「賛成」「反対」と明言していなくても、感情・評価・問題意識から立場が読み取れる場合は該当カテゴリに分類してください。
  - 皮肉・反語・疑問形も文脈から実際の主張を推定して分類してください。
  - 「教員の働き方改革」「教員の無償労働」「ブラック部活」「祝日すら休めない」「残業80時間」など教員の負担を理由に地域移行や部活削減を支持する投稿は「教員負担の軽減」です。
  - 「少子化で部員が集まらない」「チームが組めない」「合同チーム」「廃部」など少子化・過疎で部活が成り立たないことを理由にする投稿は「少子化・維持困難」です。
  - 「月謝が高い」「受け皿がない」「指導者が見つからない」「地方では無理」「お金がかかる」「安全面がクリアできない」など費用やインフラの問題を指摘する投稿は「費用・受け皿の懸念」です。
  - 「部活は学校の一部」「教育としての価値」「仲間との絆」「甲子園」「青春」「丸投げ」など部活の教育的・文化的意義を理由に移行に反対する投稿は「教育的価値の喪失」です。
  - 「まず受け皿を整備してから」「段階的にやるべき」「仕組みづくりが先」「クラブ化とは何か」など制度設計の改善や条件整備を求める投稿は「条件付き・制度設計」です。
  - 「部活廃止」「部活なんて要らない」「廃止一択」「廃止で良い」「廃止すべき」など部活自体の廃止・大幅縮小を主張する投稿は「部活廃止・縮小論」です。地域移行ではなく廃止を求める点がポイントです。
  - 「現役教員です」「保護者として」「子どもの部活が」「外部委託の先生から聞いた」など具体的な体験・現場の声が中心の投稿は「現場体験・当事者報告」です。
  - 自治体の取り組み紹介、議会質問の告知、調査結果の共有、ニュース記事のシェアなど、テーマに関連する情報提供が中心の投稿は「情報共有・ニュース言及」です。
  - stance は投稿者の地域移行への態度です。「賛成」は移行・外部委託・廃止を肯定、「反対」は移行に反対・現状維持、「条件付き」は条件を付けて賛成、「体験・現場報告」は体験共有が中心、「情報共有」は情報提供のみ、「判断不能」は態度不明。
  - policy_attitude は地域移行政策への態度を「推進」「反対」「条件付き」「判断不能」で分類してください。部活廃止を主張する投稿は「推進」（現状からの変革を求める点で）です。
  - experience_type は投稿者の立場を分類してください。議員や行政関係者の発言は「議員・行政視点」です。
  - article_usable は代表意見として記事に使える具体的な意見・体験がある場合 true。ニュース共有のみ、短すぎる投稿、攻撃的表現が中心の投稿は false。
  - 「情報共有・ニュース言及」「その他・分類保留」の場合、article_usable は必ず false にしてください。
  - 攻撃的表現は summary で中和してください。
  - confidence は 0.0 から 1.0。テーマに関連する投稿は 0.6 以上を目安にしてください。

avoid_hold_rules: |
  - これは一度保留になった投稿の再分類です。保留にする条件を大幅に緩和してください。
  - 部活動・地域移行・外部委託・教員負担・部活廃止のいずれかに少しでも関係する投稿は、最も近いカテゴリに必ず分類してください。
  - ニュース共有・事実伝達であっても、テーマに関連していれば「情報共有・ニュース言及」に分類してください。
  - 提案・疑問・皮肉・体験談・感想も、テーマに関連していれば適切なカテゴリに分類してください。
  - 完全にテーマと無関係な投稿のみ「その他・分類保留」に残してください。

